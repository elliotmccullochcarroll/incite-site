<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- White background -->
  <rect width="512" height="512" fill="#f5f4f0" rx="92"/>
  
  <!-- Circle ring: center 256,256 radius 146 -->
  <circle cx="256" cy="256" r="146" fill="none" stroke="#0a0a0f" stroke-width="9.3"/>
  
  <!-- Slash: endpoints at 45deg on circle circumference -->
  <!-- 146/sqrt(2) = 103.2 -->
  <!-- lower-left: (256-103, 256+103) = (153, 359) -->
  <!-- upper-right: (256+103, 256-103) = (359, 153) -->
  <line x1="153" y1="359" x2="359" y2="153" stroke="#0a0a0f" stroke-width="18.2" stroke-linecap="round"/>
  
  <!-- Two endpoint dots — filled, same size, perfectly mirrored -->
  <circle cx="359" cy="153" r="23.4" fill="#0a0a0f"/>
  <circle cx="153" cy="359" r="23.4" fill="#0a0a0f"/>
</svg>
